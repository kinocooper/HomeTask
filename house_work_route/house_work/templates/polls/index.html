{% load static %}

<link rel="stylesheet" href="{% static 'house_work/style.css' %}">

{% if latest_question_list %}
    <ul>
    {% for question in latest_question_list %}
        <li><a href="{% url 'house_work:detail' question.id %}">{{ question.house_work_text }}</a></li>
        {% endfor %}
    </ul>
{% else %}
    <p>No house work are available.</p>
{% endif %}
